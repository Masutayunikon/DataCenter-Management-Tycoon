name: Rebase release PRs

on:
  push:
    branches: [main]

jobs:
  rebase:
    runs-on: ubuntu-latest
    # Skip commits made by this workflow itself to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip rebase]')"
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Step 1: sync the manifest with actual package.json versions ──────────
      # If the manifest is stale (e.g. package.json says 3.0.2 but manifest says
      # 3.0.1), release-please keeps reopening the same PR on every push.
      # Fix: keep manifest == package.json so release-please has the right baseline.
      - name: Sync manifest with package.json versions
        id: sync
        run: |
          ROOT_VERSION=$(jq -r '.version' package.json 2>/dev/null || echo "")
          SERVER_VERSION=$(jq -r '.version' server/package.json 2>/dev/null || echo "")
          MANIFEST=$(cat .release-please-manifest.json)
          UPDATED=$MANIFEST

          if [ -n "$ROOT_VERSION" ]; then
            UPDATED=$(echo "$UPDATED" | jq --arg v "$ROOT_VERSION" \
              'if .["."] != $v then . + {".": $v} else . end')
          fi
          if [ -n "$SERVER_VERSION" ]; then
            UPDATED=$(echo "$UPDATED" | jq --arg v "$SERVER_VERSION" \
              'if .["server"] != $v then . + {"server": $v} else . end')
          fi

          if [ "$MANIFEST" != "$UPDATED" ]; then
            echo "$UPDATED" > .release-please-manifest.json
            git add .release-please-manifest.json
            git commit -m "chore: sync manifest with package.json versions [skip rebase]"
            git push origin main
            echo "synced=true" >> $GITHUB_OUTPUT
            echo "✓ manifest synced — release-please PRs will rebase on next push"
          else
            echo "synced=false" >> $GITHUB_OUTPUT
            echo "→ manifest already in sync"
          fi

      # ── Step 2: rebase open release PRs onto the now-clean main ─────────────
      - name: Rebase open release-please PRs
        if: steps.sync.outputs.synced == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          branches=$(gh pr list \
            --search "head:release-please--branches--main" \
            --json headRefName \
            --jq '.[].headRefName')

          for branch in $branches; do
            echo "→ Rebasing $branch"
            git fetch origin "$branch"
            git checkout -b "tmp-$branch" "origin/$branch"

            if git rebase origin/main; then
              git push origin "HEAD:$branch" --force-with-lease
              echo "✓ $branch rebased cleanly"
            else
              # Conflict resolution.
              # IMPORTANT: inside `git rebase`, --theirs = the PR's commit being
              # replayed, --ours = origin/main. Keep the PR's versions for all
              # release-managed files (manifest, package.json, changelogs).
              if [ -f .release-please-manifest.json ]; then
                for f in \
                  .release-please-manifest.json \
                  package.json \
                  server/package.json \
                  CHANGELOG.md \
                  server/CHANGELOG.md; do
                  git checkout --theirs "$f" 2>/dev/null || true
                done
                git add -A
                GIT_EDITOR=true git rebase --continue
                git push origin "HEAD:$branch" --force-with-lease
                echo "✓ $branch rebased (conflicts resolved: PR versions kept)"
              else
                git rebase --abort
                echo "✗ $branch — conflict non résolvable automatiquement"
              fi
            fi

            git checkout main
            git branch -D "tmp-$branch" 2>/dev/null || true
          done
