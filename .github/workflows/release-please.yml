name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created:        ${{ steps.rp.outputs.release_created }}
      tag_name:               ${{ steps.rp.outputs.tag_name }}
      site--release_created:  ${{ steps.rp.outputs['site--release_created'] }}
      site--tag_name:         ${{ steps.rp.outputs['site--tag_name'] }}
      server--release_created: ${{ steps.rp.outputs['server--release_created'] }}
      server--tag_name:        ${{ steps.rp.outputs['server--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
